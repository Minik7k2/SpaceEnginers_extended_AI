# Reguły świata (hot-reload). Świat MŚCIWY.

[llm]
model_path = "models/qwen2.5-3b-instruct-q4_k_m.gguf"
use_gpu = true          # false => CPU (gdy SE zjada VRAM)
max_chars = 200

[bridge]
# storage_dir jest per maszyna — ustaw go w rules.local.toml (obok tego pliku,
# poza gitem). Wartości z rules.local.toml nadpisują te z rules.toml.
storage_dir = ""
poll_ms = 500
db_path = "state/zf_state.sqlite3"   # ścieżka do bazy brain (offsety, relacje)
rotate_bytes = 5242880               # 5 MB, próg rotacji plików JSONL

[relacje]
prog_sojusznik = 40
prog_wrogi = -30
prog_wojna = -60
histereza_wyjscie_z_wojny = -50
dryf_pkt = 1
dryf_co_minut = 120

[zmiany]
ostrzal_min = -5
ostrzal_max = -15
zniszczenie_statku = -30
zniszczenie_stacji = -50
sufit_po_zniszczeniu_stacji = 20
handel_min = 1
handel_max = 3
kontrakt_min = 10
kontrakt_max = 20
atak_na_wroga_bonus = 5

[tick]
co_minut = 4
szansa_zdarzenia_losowego = 0.35
budzet_akcji_na_tick = 1

[radio]
# 1/min = odstęp 60 s (za długo dla rozmowy — follow-up ginął). 6/min = 10 s:
# komfortowa rozmowa @frakcja i zjada dublowane wysyłki. Zmiana hot-reload.
# Dla snappier: 12 = 5 s. Zdarzenia bojowe mają osobny, stały cooldown 15 s.
limit_na_frakcje_na_min = 6
ttl_sekund = 120
